<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtonomy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    .dawn-image {
      max-width: 400px;
      width: 100%;
      height: auto;
    }

    .hi-btn {
      margin-top: 24px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      background: #1a6bdc;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(26,107,220,0.35);
    }

    .hi-btn:hover {
      background: #1558c0;
      transform: translateY(-1px);
    }

    .hi-btn:active {
      transform: scale(0.97);
    }

    .counters {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 32px;
      font-size: 0.88rem;
      color: #888;
    }

    .counter-item span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a6bdc;
      line-height: 1.2;
    }

    @media (max-width: 640px) {
      .hi-btn { font-size: 1rem; padding: 12px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Dawn_Transparent.png" alt="Dawn" class="dawn-image" />

    <button class="hi-btn" id="hiBtn">Say Hi to Dawn</button>

    <div class="counters">
      <div class="counter-item">
        <span id="visitCount">0</span>
        Page Visits
      </div>
      <div class="counter-item">
        <span id="clickCount">0</span>
        Hi's Said
      </div>
    </div>
  </div>

  <script>
    // --- Counters ---
    const visitKey = 'realtonomy_visits';
    const clickKey = 'realtonomy_hi_clicks';

    const visits = (parseInt(localStorage.getItem(visitKey) || '0')) + 1;
    localStorage.setItem(visitKey, visits);
    document.getElementById('visitCount').textContent = visits;

    document.getElementById('clickCount').textContent =
      localStorage.getItem(clickKey) || '0';

    // --- Speech Synthesis ---
    function sayHi() {
      const clicks = (parseInt(localStorage.getItem(clickKey) || '0')) + 1;
      localStorage.setItem(clickKey, clicks);
      document.getElementById('clickCount').textContent = clicks;

      const utterance = new SpeechSynthesisUtterance(".......Hi there, I'm Dawn. See you later.");
      utterance.lang = 'en-GB';

      function doSpeak() {
        const voices = speechSynthesis.getVoices();
        const britishFemale = voices.find(v => v.name === 'Google UK English Female')
          || voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('female'))
          || voices.find(v => v.lang === 'en-GB');
        if (britishFemale) utterance.voice = britishFemale;

        const primer = new SpeechSynthesisUtterance(' ');
        primer.volume = 0;
        if (britishFemale) primer.voice = britishFemale;
        speechSynthesis.speak(primer);

        setTimeout(() => speechSynthesis.speak(utterance), 300);
      }

      if (speechSynthesis.getVoices().length > 0) {
        doSpeak();
      } else {
        speechSynthesis.onvoiceschanged = doSpeak;
      }
    }

    document.getElementById('hiBtn').addEventListener('click', sayHi);
  </script>
</body>
</html>
