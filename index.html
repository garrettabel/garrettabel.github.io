<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Realtonomy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 600px; }
    .dawn-image { max-width: 400px; width: 100%; height: auto; }
    .hi-btn {
      margin-top: 24px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      background: #1a6bdc;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(26,107,220,0.35);
    }
    .hi-btn:hover { background: #1558c0; transform: translateY(-1px); }
    .hi-btn:active { transform: scale(0.97); }
    .counters {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 32px;
      font-size: 0.88rem;
      color: #888;
    }
    .counter-item span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a6bdc;
      line-height: 1.2;
    }
    @media (max-width: 640px) {
      .hi-btn { font-size: 1rem; padding: 12px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Dawn_Transparent.png" alt="Dawn" class="dawn-image" />
    <button class="hi-btn" id="hiBtn">Say Hi to Dawn</button>
    <div class="counters">
      <div class="counter-item">
        <span id="visitCount">...</span>
        Page Visits
      </div>
      <div class="counter-item">
        <span id="clickCount">...</span>
        Hi's Said
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    /* ── Firebase ─────────────────────────────────────────── */
    firebase.initializeApp({
      apiKey: "AIzaSyCfssB7iM_zTHDBOVoLH9JqVxNZwaVbK9s",
      authDomain: "realtonomy.firebaseapp.com",
      projectId: "realtonomy",
      storageBucket: "realtonomy.firebasestorage.app",
      messagingSenderId: "393079711947",
      appId: "1:393079711947:web:612f107ae44720261ed34e"
    });

    var db          = firebase.firestore();
    var ref         = db.collection("stats").doc("counters");
    var FV          = firebase.firestore.FieldValue;
    var visitEl     = document.getElementById('visitCount');
    var clickEl     = document.getElementById('clickCount');

    function showCounts(snap) {
      var d = snap.data() || {};
      visitEl.textContent = d.visits || 0;
      clickEl.textContent = d.clicks || 0;
    }

    function showError() {
      visitEl.textContent = '-';
      clickEl.textContent = '-';
    }

    // Increment visit counter then display both counts.
    // On failure, retry once after 3 s (helps Safari ITP cold-start).
    ref.set({ visits: FV.increment(1) }, { merge: true })
      .then(function() { return ref.get(); })
      .then(showCounts)
      .catch(function() {
        setTimeout(function() {
          ref.get().then(showCounts).catch(showError);
        }, 3000);
      });

    /* ── Speech synthesis ────────────────────────────────── */

    // Verified female voice names, British-first priority.
    // Uses exact prefix matching so e.g. "Microsoft Libby" matches
    // "Microsoft Libby Online (Natural)" without risking false matches.
    var FEMALE_VOICES = [
      'Google UK English Female',
      'Microsoft Libby',
      'Microsoft Mia',
      'Microsoft Sonia',
      'Microsoft Hazel',
      'Serena',
      'Martha',
      'Microsoft Zira',
      'Microsoft Jenny',
      'Microsoft Aria',
      'Microsoft Michelle',
      'Microsoft Monica',
      'Samantha',
      'Victoria',
      'Karen',
      'Moira',
      'Tessa'
    ];

    // Male names to exclude from en-GB / en fallback
    var MALE_NAMES = [
      'David', 'Mark', 'Daniel', 'George', 'James', 'Ryan',
      'Thomas', 'Eric', 'Guy', 'Richard', 'Fred', 'Alex',
      'Bruce', 'Junior', 'Ralph', 'Albert'
    ];

    var selectedVoice = null;   // resolved once voices are available

    function pickVoice(voices) {
      // Pass 1: known female by name
      for (var i = 0; i < FEMALE_VOICES.length; i++) {
        for (var j = 0; j < voices.length; j++) {
          if (voices[j].name.indexOf(FEMALE_VOICES[i]) === 0) {
            return voices[j];
          }
        }
      }
      // Pass 2: any en-GB voice not on the male list
      for (var j = 0; j < voices.length; j++) {
        var v = voices[j];
        if (v.lang === 'en-GB' && !MALE_NAMES.some(function(m) { return v.name.indexOf(m) > -1; })) {
          return v;
        }
      }
      // Pass 3: any English voice not on the male list
      for (var j = 0; j < voices.length; j++) {
        var v = voices[j];
        if (v.lang.indexOf('en') === 0 && !MALE_NAMES.some(function(m) { return v.name.indexOf(m) > -1; })) {
          return v;
        }
      }
      return null;
    }

    function resolveVoice() {
      var voices = speechSynthesis.getVoices();
      if (voices.length > 0) {
        selectedVoice = pickVoice(voices);
      }
    }

    // Resolve immediately if already available, otherwise wait for the event.
    // onvoiceschanged fires once; after that we leave it null so nothing conflicts.
    resolveVoice();
    if (!selectedVoice) {
      speechSynthesis.onvoiceschanged = function() {
        speechSynthesis.onvoiceschanged = null;
        resolveVoice();
      };
    }

    function speakDawn() {
      var utterance = new SpeechSynthesisUtterance('Hi Back! See ya later.');
      utterance.lang  = 'en-GB';
      utterance.rate  = 0.95;
      // Re-resolve at speak-time in case voices loaded after page init
      if (!selectedVoice) resolveVoice();
      if (selectedVoice) utterance.voice = selectedVoice;
      speechSynthesis.speak(utterance);
    }

    /* ── Button handler ──────────────────────────────────── */
    document.getElementById('hiBtn').addEventListener('click', function() {
      // Increment click counter and refresh display
      ref.set({ clicks: FV.increment(1) }, { merge: true })
        .then(function() { return ref.get(); })
        .then(function(snap) {
          clickEl.textContent = (snap.data() || {}).clicks || 0;
        });

      // Speak directly — no cancel(), no setTimeout, preserves user gesture
      speakDawn();
    });
  </script>
</body>
</html>
