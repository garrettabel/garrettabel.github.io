<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Realtonomy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 600px; }
    .dawn-image { max-width: 400px; width: 100%; height: auto; }
    .hi-btn {
      margin-top: 24px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      background: #1a6bdc;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(26,107,220,0.35);
    }
    .hi-btn:hover { background: #1558c0; transform: translateY(-1px); }
    .hi-btn:active { transform: scale(0.97); }
    .counters {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 32px;
      font-size: 0.88rem;
      color: #888;
    }
    .counter-item span {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a6bdc;
      line-height: 1.2;
    }
    @media (max-width: 640px) {
      .hi-btn { font-size: 1rem; padding: 12px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Dawn_Transparent.png" alt="Dawn" class="dawn-image" />
    <button class="hi-btn" id="hiBtn">Say Hi to Dawn</button>
    <div class="counters">
      <div class="counter-item">
        <span id="visitCount">...</span>
        Page Visits
      </div>
      <div class="counter-item">
        <span id="clickCount">...</span>
        Hi's Said
      </div>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyCfssB7iM_zTHDBOVoLH9JqVxNZwaVbK9s",
      authDomain: "realtonomy.firebaseapp.com",
      projectId: "realtonomy",
      storageBucket: "realtonomy.firebasestorage.app",
      messagingSenderId: "393079711947",
      appId: "1:393079711947:web:612f107ae44720261ed34e"
    });
    var db = firebase.firestore();
    var countersRef = db.collection("stats").doc("counters");
    var FieldValue = firebase.firestore.FieldValue;

    // Record page visit and read both counters
    countersRef.set({ visits: FieldValue.increment(1) }, { merge: true })
      .then(function() { return countersRef.get(); })
      .then(function(snap) {
        var data = snap.data() || {};
        document.getElementById('visitCount').textContent = data.visits || 0;
        document.getElementById('clickCount').textContent = data.clicks || 0;
      })
      .catch(function() {
        setTimeout(function() {
          countersRef.get()
            .then(function(snap) {
              var data = snap.data() || {};
              document.getElementById('visitCount').textContent = data.visits || 0;
              document.getElementById('clickCount').textContent = data.clicks || 0;
            })
            .catch(function() {
              document.getElementById('visitCount').textContent = '-';
              document.getElementById('clickCount').textContent = '-';
            });
        }, 3000);
      });

    // Known male voice names to explicitly exclude
    var maleVoiceNames = [
      'David', 'Mark', 'Daniel', 'George', 'James', 'Ryan',
      'Thomas', 'Eric', 'Guy', 'Richard', 'Fred', 'Alex',
      'Bruce', 'Junior', 'Ralph', 'Albert', 'Bad News',
      'Bahh', 'Bells', 'Boing', 'Bubbles', 'Cellos',
      'Deranged', 'Good News', 'Hysterical', 'Pipe Organ',
      'Trinoids', 'Whisper', 'Zarvox'
    ];

    function isMale(voice) {
      var n = voice.name;
      for (var i = 0; i < maleVoiceNames.length; i++) {
        if (n.indexOf(maleVoiceNames[i]) > -1) return true;
      }
      return false;
    }

    // Verified female voice names across Chrome, Edge, Safari, Firefox
    var femaleVoiceNames = [
      'Google UK English Female',
      'Microsoft Libby',
      'Microsoft Mia',
      'Microsoft Sonia',
      'Microsoft Hazel',
      'Serena',
      'Martha',
      'Microsoft Zira',
      'Microsoft Jenny',
      'Microsoft Aria',
      'Microsoft Michelle',
      'Microsoft Monica',
      'Samantha',
      'Victoria',
      'Karen',
      'Moira',
      'Tessa',
      'Fiona',
      'Google US English'
    ];

    function getVoice() {
      var voices = speechSynthesis.getVoices();
      for (var i = 0; i < femaleVoiceNames.length; i++) {
        var target = femaleVoiceNames[i];
        for (var j = 0; j < voices.length; j++) {
          if (voices[j].name.indexOf(target) > -1) return voices[j];
        }
      }
      for (var j = 0; j < voices.length; j++) {
        if (voices[j].lang === 'en-GB' && !isMale(voices[j])) return voices[j];
      }
      for (var j = 0; j < voices.length; j++) {
        if (voices[j].lang.indexOf('en') === 0 && !isMale(voices[j])) return voices[j];
      }
      return null;
    }

    // Pre-load voices as early as possible so they are ready on first click
    var voicesReady = false;
    function loadVoices() {
      var voices = speechSynthesis.getVoices();
      if (voices.length > 0) {
        voicesReady = true;
      }
    }
    loadVoices();
    speechSynthesis.onvoiceschanged = function() {
      loadVoices();
    };

    function speakDawn() {
      // IMPORTANT: Do NOT call speechSynthesis.cancel() here.
      // cancel() consumes the user gesture in many browsers, causing
      // speak() to be treated as a non-gesture call and silently fail.
      // Instead we just speak directly - if already speaking it will queue.
      var utterance = new SpeechSynthesisUtterance('Hi, I am Dawn. See you later.');
      utterance.lang = 'en-GB';
      utterance.rate = 0.95;
      var voice = getVoice();
      if (voice) utterance.voice = voice;
      speechSynthesis.speak(utterance);
    }

    function sayHi() {
      // Update Firebase click counter
      countersRef.set({ clicks: FieldValue.increment(1) }, { merge: true })
        .then(function() { return countersRef.get(); })
        .then(function(snap) {
          document.getElementById('clickCount').textContent = snap.data().clicks || 0;
        });

      if (voicesReady) {
        speakDawn();
      } else {
        // Voices not loaded yet - wait then speak (still within gesture on most browsers)
        speechSynthesis.onvoiceschanged = function() {
          speechSynthesis.onvoiceschanged = function() { loadVoices(); };
          voicesReady = true;
          speakDawn();
        };
        // Also try a short timeout as fallback for browsers that already fired onvoiceschanged
        setTimeout(function() {
          if (!speechSynthesis.speaking) speakDawn();
        }, 100);
      }
    }

    document.getElementById('hiBtn').addEventListener('click', sayHi);
  </script>
</body>
</html>
